; ── Transport ────────────────────────────────────────────────────────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

; ── Endpoint, Auth, AOR — all named "mobile_client" ─────────────────────────
; Asterisk matches an incoming REGISTER to the AOR whose name = SIP username.
; So all three objects must be named exactly "mobile_client".

[1001]
type=endpoint
context=default
disallow=all
allow=ulaw
transport=transport-udp
auth=1001
aors=1001

[1001]
type=auth
auth_type=userpass
password=1001
username=1001

[1001]
type=aor
max_contacts=1