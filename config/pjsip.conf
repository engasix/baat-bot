[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0
; Advertise the Mac's real WiFi IP in SDP so clients know where to send RTP.
; Docker maps ports 10000-10010 from this IP into the container.
; Update this if your Mac's WiFi IP changes (ipconfig getifaddr en0).
external_media_address=192.168.100.201
external_signaling_address=192.168.100.201

;------ 1001
[1001]
type=endpoint
context=default
disallow=all
allow=g722
allow=ulaw
transport=transport-udp
auth=1001
aors=1001
direct_media=no
force_rport=yes
rewrite_contact=yes

[1001]
type=auth
auth_type=userpass
password=1001
username=1001

[1001]
type=aor
max_contacts=5
qualify_frequency=30

;------ 1002
[1002]
type=endpoint
context=default
disallow=all
allow=g722
allow=ulaw
transport=transport-udp
auth=1002
aors=1002
direct_media=no
force_rport=yes
rewrite_contact=yes

[1002]
type=auth
auth_type=userpass
password=1002
username=1002

[1002]
type=aor
max_contacts=1
qualify_frequency=30
